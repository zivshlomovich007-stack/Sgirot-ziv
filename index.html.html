// ---- firebase sync ----
// Force-update ONLY the fighters roster from the code's FIGHTERS constant,
// preserving all history/closures. Useful after changing names/tags in code.
function syncFightersFromCode(){
  fighters = FIGHTERS.map(function(f){ return Object.assign({}, f); });
  // preserve active/inactive state that may have been changed in the app? No - code is source of truth here.
  pushToCloud();
  showToast("\u05E8\u05E9\u05D9\u05DE\u05EA \u05D4\u05DC\u05D5\u05D7\u05DE\u05D9\u05DD \u05E2\u05D5\u05D3\u05DB\u05E0\u05D4");
  render();
}

function pushToCloud() {
  // every push bumps the version so cloud always reflects the newest writer
  localVersion = Date.now();
  saveLocal();
  if(!fbOK || !DOC){ pendingLocalWrite = true; return; }
  try {
    DOC.set({ fighters: fighters, history: history, version: localVersion })
       .then(function(){ cloudVersion = localVersion; pendingLocalWrite = false; })
       .catch(function(e){ console.error("save error", e); pendingLocalWrite = true; });
  } catch(e){ console.error("save error", e); pendingLocalWrite = true; }
}

// Connect to Firebase using compat SDK (works in all browsers, no modules)
var _fbTries = 0;
function connectFirebase(){
  try {
    if(typeof firebase === "undefined" || !firebase.firestore){
      _fbTries++;
      if(_fbTries <= 60){ setTimeout(connectFirebase, 300); return; } // retry up to ~18s
      console.warn("Firebase SDK not loaded after retries, local only");
      return;
    }
    if(fbOK) return; // already connected
    if(!firebase.apps || !firebase.apps.length){ firebase.initializeApp(firebaseConfig); }
    db = firebase.firestore();
    DOC = db.collection("rotation").doc("main");
    fbOK = true;
    DOC.onSnapshot(function(snap){
      if(snap.exists){
        var data = snap.data();
        var incomingVer = data.version || 0;
        // If we have local changes that are newer than (or not yet in) the cloud,
        // DO NOT overwrite them. Push our local version up instead.
        if(pendingLocalWrite && localVersion > incomingVer){
          pushToCloud();
          loaded = true; render();
          return;
        }
        // Otherwise accept the cloud data (it's newer or equal)
        if(incomingVer >= localVersion){
          if(data.fighters) fighters = data.fighters;
          if(data.history) history = data.history;
          cloudVersion = incomingVer;
          localVersion = incomingVer;
          pendingLocalWrite = false;
          saveLocal();
        }
      } else {
        // cloud empty -> seed it with whatever we have locally
        pushToCloud();
      }
      loaded = true;
      render();
    }, function(err){
      console.error("snapshot error", err);
    });
  } catch(e) {
    console.error("Firebase connect failed, using local data", e);
    fbOK = false;
  }
}

// ---- logic ----
function endDateOf(s){
  try{
    var p=s.split("."); var dd=p[0].split("-"); var last=parseInt(dd[dd.length-1],10);
    return new Date(2026, parseInt(p[1],10)-1, last, 23,59,59);
  }catch(e){ return null; }
}
function isPast(s){ var d=endDateOf(s); return d ? d.getTime()<Date.now() : false; }

function calcCounts(hist){
  var c={};
  fighters.forEach(function(f){ c[f.id]={total:0,atlit:0,t23:0,sadat:0,konan:0,kk:0,mkKK:0,mkutz:0,op:0,opMorning:0,opEvening:0,mkBoker:0,mkErev:0}; });
  (hist||[]).forEach(function(w){
    if(!w) return;
    if(w.type==="op"){
      (w.people||[]).forEach(function(id){
        if(!c[id]) return;
        c[id].op++;
        if(w.opSize==="full"){ c[id].total++; }
        if(w.opSize==="sat_morning"){ c[id].opMorning++; }
        if(w.opSize==="sat_evening"){ c[id].opEvening++; }
      });
      return;
    }
    // flexible slots model (also handles legacy via weekSlots)
    weekSlots(w).forEach(function(sl){
      var rdef = ROLES[sl.role] || {counts:true};
      (sl.people||[]).forEach(function(id){
        if(!c[id]) return;
        // per-role tally
        if(c[id][sl.role]!==undefined) c[id][sl.role]++;
        if(sl.role==="kk") c[id].mkKK++;   // keep legacy alias
        // does it count toward total fairness?
        if(sl.role==="kk"){
          // kk: full counts, mkutz doesn't (tracked separately)
          if((sl.kkType||"full")==="full"){ c[id].total++; }
          else { c[id].mkutz++; }
        } else if(sl.role==="konan"){
          // konan bait: counts ONLY if activated (פעילות התרחשה)
          if(w.konanActivated){ c[id].total++; }
        } else if(sl.role==="mkBoker"){
          c[id].opMorning++;  // tracked as early-morning return, NOT a closure
        } else if(sl.role==="mkErev"){
          c[id].opEvening++;  // tracked as early-evening return, NOT a closure
        } else if(rdef.counts){
          c[id].total++;
        }
      });
    });
  });
  return c;
}
function lastMkutz(hist){
  var s=hist.slice().sort(function(a,b){return b.id-a.id;});
  for(var i=0;i<s.length;i++){
    var sl=weekSlots(s[i]).filter(function(x){return x.role==="kk"&&(x.kkType||"full")==="mkutz";})[0];
    if(sl) return sl.people[0];
    if(i===0) break; // only check the most recent week
  }
  return null;
}
// Returns who closed the single most-recent weekend in a given history list
function prevWeekendIds(hist){
  var s=hist.slice().sort(function(a,b){var da=endDateOf(a.date),db=endDateOf(b.date);return (db?db.getTime():0)-(da?da.getTime():0);});
  if(s.length===0) return [];
  var w=s[0];
  if(w.type==="op") return (w.people||[]).slice();
  // only people who ACTUALLY closed count as "closed last weekend".
  // konan-bait people who were NOT activated did not really close -> excluded.
  var ids=[];
  weekSlots(w).forEach(function(sl){
    if(sl.role==="konan" && !w.konanActivated) return; // skip non-activated konan
    if(sl.role==="mkBoker" || sl.role==="mkErev") return; // mkutzeret is not closing
    ids=ids.concat(sl.people);
  });
  return ids;
}
// Returns who returned EARLY (sat morning/evening) in the most recent op - they should rest next weekend
function earlyReturnIds(hist){
  var s=hist.slice().sort(function(a,b){var da=endDateOf(a.date),db=endDateOf(b.date);return (db?db.getTime():0)-(da?da.getTime():0);});
  for(var i=0;i<s.length;i++){
    var w=s[i];
    if(w.type==="op" && (w.opSize==="sat_morning"||w.opSize==="sat_evening")){
      return (w.people||[]).slice();
    }
    // stop at the most recent weekend-level event
    if(i===0) continue;
  }
  // simpler: just check the single most recent op-early
  var recent = s.filter(function(w){return w.type==="op"&&(w.opSize==="sat_morning"||w.opSize==="sat_evening");});
  return recent.length? (recent[0].people||[]).slice() : [];
}

// Recommend ranked candidates for ONE slot of a given role.
// hist = closures to count from. taken = ids already placed in THIS closure. avoid = recent-weekend ids.
function recommendForSlot(hist, role, taken, avoid){
  var counts=calcCounts(hist);
  var needsSamal = ROLES[role] && ROLES[role].needsSamal;
  var pool=fighters.filter(function(f){
    if(!f.active) return false;
    if(taken.indexOf(f.id)!==-1) return false;
    if(blocked.indexOf(f.id)!==-1) return false;
    return true;
  });
  var reserveSamal = !needsSamal; // for non-atlit roles, prefer non-samal on ties
  pool.sort(function(a,b){
    var t=counts[a.id].total-counts[b.id].total;        // EQUALITY first, always
    if(t!==0) return t;
    var ra=avoid.indexOf(a.id)!==-1?1:0, rb=avoid.indexOf(b.id)!==-1?1:0;
    if(ra!==rb) return ra-rb;                             // avoid back-to-back
    if(reserveSamal){ var sa=a.isSamal?1:0,sb=b.isSamal?1:0; if(sa!==sb) return sa-sb; } // keep samals for צ צפון
    return (counts[a.id][role]||0)-(counts[b.id][role]||0); // variety in role
  });
  // if role needs a samal and none taken yet is a samal, force samal to top
  if(needsSamal){
    var hasSamal = taken.some(function(id){ return F(id)&&F(id).isSamal; });
    if(!hasSamal){
      var samals=pool.filter(function(f){return f.isSamal;});
      var rest=pool.filter(function(f){return !f.isSamal;});
      pool=samals.concat(rest);
    }
  }
  return pool;
}

// Build a human-readable reason string for why a fighter is ranked where they are.
function slotReason(f, hist, role, avoid){
  var counts=calcCounts(hist);
  var c=counts[f.id]||{total:0};
  var parts=[];
  // total closures - the main fairness signal
  parts.push(c.total+" \u05E1\u05D2\u05D9\u05E8\u05D5\u05EA \u05D1\u05E1\u05D4\u05F4\u05DB");
  // recently closed?
  if(avoid.indexOf(f.id)!==-1){ parts.push("\u05E1\u05D2\u05E8 \u05DC\u05D0\u05D7\u05E8\u05D5\u05E0\u05D4 \u2014 \u05E2\u05D3\u05D9\u05E3 \u05DC\u05E0\u05D5\u05D7"); }
  else { parts.push("\u05DC\u05D0 \u05E1\u05D2\u05E8 \u05D1\u05E1\u05D5\u05E4\u05F4\u05E9 \u05D4\u05D0\u05D7\u05E8\u05D5\u05DF"); }
  // samal reservation note
  if(ROLES[role] && !ROLES[role].needsSamal && f.isSamal){
    parts.push("\u05E1\u05DE\u05DC \u2014 \u05E2\u05D3\u05D9\u05E3 \u05DC\u05E9\u05DE\u05D5\u05E8 \u05DC\u05E6 \u05E6\u05E4\u05D5\u05DF");
  }
  // role variety
  var inRole=c[role]||0;
  if(inRole>0) parts.push("\u05E2\u05E9\u05D4 "+inRole+" \u05E4\u05E2\u05DE\u05D9\u05DD \u05D1\u05EA\u05E4\u05E7\u05D9\u05D3 \u05D6\u05D4");
  // mkutzeret / early returns
  var shorts=(c.mkutz||0)+(c.opMorning||0)+(c.opEvening||0);
  if(shorts>0) parts.push(shorts+" \u05DE\u05E7\u05D5\u05E6\u05E8\u05D5\u05EA/\u05D7\u05D6\u05E8\u05D5\u05EA \u05DE\u05D5\u05E7\u05D3\u05DE\u05D5\u05EA");
  return parts;
}

// short one-liner reason (most important signal)
function slotReasonShort(f, hist, role, avoid){
  var counts=calcCounts(hist);
  var c=counts[f.id]||{total:0};
  var bits=[c.total+" \u05E1\u05D2\u05D9\u05E8\u05D5\u05EA"];
  if(avoid.indexOf(f.id)!==-1) bits.push("\u05E1\u05D2\u05E8 \u05DC\u05D0\u05D7\u05E8\u05D5\u05E0\u05D4");
  return bits.join(" \u00B7 ");
}

function buildSug(hist, recentIds){
  recentIds = recentIds || [];
  var counts=calcCounts(hist), prev=lastMkutz(hist);
  var pool=fighters.filter(function(f){return f.active&&blocked.indexOf(f.id)===-1;});
  function recentPenalty(id){ return recentIds.indexOf(id)!==-1 ? 100 : 0; }

  // RULE 1 (always): fewest TOTAL closures wins -> full equality, samal or not.
  // RULE 2 (tiebreak only): avoid recent weekend.
  // RULE 3 (tiebreak only): for צ23 / כ"כ, prefer NON-samal (keep samals for צ צפון).
  // RULE 4 (tiebreak only): fewest in that specific role.
  function sorter(roleKey, reserveSamal){
    return function(a,b){
      var ta = counts[a.id].total, tb = counts[b.id].total;
      if(ta !== tb) return ta - tb;                       // equality first, above everything
      var r = recentPenalty(a.id) - recentPenalty(b.id);
      if(r !== 0) return r;                                // then avoid back-to-back
      if(reserveSamal){                                    // then keep samals for צ צפון
        var sa = a.isSamal?1:0, sb = b.isSamal?1:0;
        if(sa !== sb) return sa - sb;                      // non-samal (0) before samal (1)
      }
      return (counts[a.id][roleKey]||0) - (counts[b.id][roleKey]||0); // then fewest in role
    };
  }

  // Assign צ צפון FIRST so a samal is reserved there (needs >=1 samal)
  var s1=pool.filter(function(f){return f.isSamal;}).sort(sorter("atlit", false))[0];
  var s2=pool.filter(function(f){return f.id!==(s1&&s1.id);}).sort(sorter("atlit", false))[0];
  // צ23 - prefer non-samal on ties
  var afterAtlit=pool.filter(function(f){return f.id!==(s1&&s1.id)&&f.id!==(s2&&s2.id);});
  var t23=afterAtlit.slice().sort(sorter("t23", true))[0];
  // כ"כ - prefer non-samal on ties; mkutzeret-last-week penalty as tiebreak on equal totals
  var mk=null;
  if(kkType!=="none"){
    var kp=pool.filter(function(f){return f.id!==(s1&&s1.id)&&f.id!==(s2&&s2.id)&&f.id!==(t23&&t23.id);});
    kp.sort(function(a,b){
      var ta = counts[a.id].total, tb = counts[b.id].total;
      if(ta !== tb) return ta - tb;
      var pa = (a.id===prev?0.5:0), pb=(b.id===prev?0.5:0);
      if(pa !== pb) return pa - pb;
      var r = recentPenalty(a.id) - recentPenalty(b.id);
      if(r !== 0) return r;
      var sa = a.isSamal?1:0, sb=b.isSamal?1:0;
      if(sa !== sb) return sa - sb;
      return (counts[a.id].mkKK||0) - (counts[b.id].mkKK||0);
    });
    mk=kp[0]||null;
  }
  return { atlit:[s1&&s1.id,s2&&s2.id].filter(Boolean), t23:[t23&&t23.id].filter(Boolean), mkKK:mk?mk.id:null };
}
function F(id){ return fighters.find(function(f){return f.id===id;}); }

// Convert any closure to a uniform list of slots [{role, people:[]}]
function weekSlots(w){
  if(!w) return [];
  // new flexible model - but validate each slot has people array
  if(w.slots && Array.isArray(w.slots)){
    return w.slots.filter(function(sl){ return sl && sl.role; }).map(function(sl){
      return { role:sl.role, people:Array.isArray(sl.people)?sl.people.filter(Boolean):[], kkType:sl.kkType };
    });
  }
  // legacy model -> build slots from old fields
  var s=[];
  if(w.atlit && w.atlit.length) s.push({role:"atlit", people:w.atlit.filter(Boolean)});
  if(w.t23 && w.t23.length)     s.push({role:"t23",   people:w.t23.filter(Boolean)});
  if(w.mkKK)                    s.push({role:"kk",     people:[w.mkKK], kkType:w.kk||"full"});
  return s;
}
// All people in a closure (regular or op)
function weekPeople(w){
  if(!w) return [];
  if(w.type==="op") return Array.isArray(w.people)?w.people.filter(Boolean):[];
  var ids=[];
  weekSlots(w).forEach(function(sl){ ids=ids.concat(sl.people); });
  return ids;
}

// Ranked replacement candidates for a slot in a planned week
function replacementCandidates(week, role, oldId){
  // count closures from everything EXCEPT this week (so the person leaving isn't double counted)
  var others = history.filter(function(x){ return x.id!==week.id; });
  var counts = calcCounts(others);
  // who closes the weekend immediately before this one
  var before = history.filter(function(x){ var d=endDateOf(x.date), wd=endDateOf(week.date); return d&&wd&&d.getTime()<wd.getTime(); });
  var recent = prevWeekendIds(before);
  // people already in THIS week (can't double-book)
  var inWeek = weekPeople(week);
  // eligible pool: active, not already in this week (except the one being replaced), and not blocked
  var pool = fighters.filter(function(f){
    if(!f.active) return false;
    if(f.id===oldId) return false;
    if(inWeek.indexOf(f.id)!==-1) return false;
    return true;
  });
  // role constraint: if this is a samal-requiring role (atlit), and no other samal is in that slot, force samal
  if(ROLES[role] && ROLES[role].needsSamal){
    var slot = weekSlots(week).filter(function(sl){return sl.role===role;})[0];
    var otherSamal = slot && slot.people.some(function(id){ return id!==oldId && F(id) && F(id).isSamal; });
    if(!otherSamal){ pool = pool.filter(function(f){ return f.isSamal; }); }
  }
  // sort: EQUALITY first (fewest total), then avoid-recent, then reserve-samal for non-atlit, then fewest in role
  var roleKey = role==="mkKK" ? "kk" : role;
  var reserveSamal = !(ROLES[role] && ROLES[role].needsSamal);
  pool.sort(function(a,b){
    var t = counts[a.id].total - counts[b.id].total;
    if(t!==0) return t;                                    // equality above all
    var ra = recent.indexOf(a.id)!==-1?1:0, rb = recent.indexOf(b.id)!==-1?1:0;
    if(ra!==rb) return ra-rb;                              // avoid back-to-back
    if(reserveSamal){
      var sa=a.isSamal?1:0, sb=b.isSamal?1:0;
      if(sa!==sb) return sa-sb;                            // keep samals for צ צפון
    }
    return (counts[a.id][roleKey]||0) - (counts[b.id][roleKey]||0);
  });
  return pool;
}

// Operational closure: ranked recommendation of who is best to send (fairness first)
function opRecommendation(){
  var counts=calcCounts(history);
  var avoid = prevWeekendIds(history).concat(earlyReturnIds(history));
  var pool=fighters.filter(function(f){return f.active;});
  pool.sort(function(a,b){
    var t=counts[a.id].total-counts[b.id].total;     // equality first
    if(t!==0) return t;
    var ra=avoid.indexOf(a.id)!==-1?1:0, rb=avoid.indexOf(b.id)!==-1?1:0;
    if(ra!==rb) return ra-rb;                          // avoid recent
    return 0;
  });
  return pool;
}

function bAvoid(){
  var ex = editId!==null ? history.filter(function(x){return x.id!==editId;}) : history;
  // find the closure immediately BEFORE the date we're currently building (bDate),
  // so multi-week-ahead planning avoids the correct preceding weekend
  var target = endDateOf(bDate);
  if(target){
    var before = ex.filter(function(x){ var d=endDateOf(x.date); return d && d.getTime() < target.getTime(); });
    if(before.length){
      return prevWeekendIds(before).concat(earlyReturnIds(before));
    }
  }
  return prevWeekendIds(ex).concat(earlyReturnIds(ex));
}
function bHist(){
  var ex = editId!==null ? history.filter(function(x){return x.id!==editId;}) : history;
  // count closures up to the date being built (past + planned-before),
  // exclude closures planned for AFTER this date (they shouldn't penalize anyone yet)
  var target = endDateOf(bDate);
  if(target){
    return ex.filter(function(x){ var d=endDateOf(x.date); return !d || d.getTime() <= target.getTime(); });
  }
  return ex;
}
// fill empty people in slots with the recommended next-in-line
function autoFillBuild(){
  var taken=[];
  bSlots.forEach(function(sl){ sl.people.forEach(function(p){ if(p) taken.push(p); }); });
  bSlots.forEach(function(sl){
    var want = sl.people.length>0 ? sl.people.length : defaultSize(sl.role);
    // only autofill if completely empty
    if(sl.people.filter(Boolean).length===0){
      var rec=recommendForSlot(bHist(), sl.role, taken, bAvoid());
      sl.people=[];
      for(var i=0;i<want && i<rec.length;i++){ sl.people.push(rec[i].id); taken.push(rec[i].id); }
    } else {
      sl.people.forEach(function(p){ if(p) taken.push(p); });
    }
  });
}

    var rec=recommendForSlot(bHist(), sl.role, taken, bAvoid());
    var ri=0;
    while(sl.people.length<n){

      var pick=null;

      sl.people.push(pick); if(pick) taken.push(pick);

// Find the next Thursday-Saturday weekend that has no closure yet, return as "DD-DD.MM"
function nextFreeWeekend(){
  // collect existing end-dates
  var taken = {};
  history.forEach(function(w){ var d=endDateOf(w.date); if(d) taken[d.toDateString()]=true; });
  // start from today, find Thursdays going forward
  var cur = new Date();
  cur.setHours(0,0,0,0);
  for(var i=0;i<120;i++){
    var day = new Date(cur.getTime() + i*86400000);
    if(day.getDay()===4){ // Thursday
      var sat = new Date(day.getTime() + 2*86400000); // Saturday
      sat.setHours(23,59,59,0);
      if(!taken[sat.toDateString()]){
        var dd=function(n){ return (n<10?"0":"")+n; };
        var mm=dd(day.getMonth()+1);
        return dd(day.getDate())+"-"+dd(sat.getDate())+"."+mm;
      }
    }
  }
  return "";
}

  // add-slot buttons

  ROLE_ORDER.forEach(function(role){

function renderForecast(){
  var allW = history.slice().sort(function(a,b){
    var da=endDateOf(a.date),db=endDateOf(b.date); return (da?da.getTime():0)-(db?db.getTime():0);
  });
  var counts = calcCounts(history);
  var activeF = fighters.filter(function(f){return f.active;});
  var today = Date.now();

  function closersOf(w){
    if(w.type==="op"){ return w.opSize==="full" ? (w.people||[]) : []; }
    var ids=[];
    weekSlots(w).forEach(function(sl){
      if(sl.role==="konan" && !w.konanActivated) return;
      if(sl.role==="kk" && (sl.kkType||"full")!=="full") return;
      ids=ids.concat(sl.people);
    });
    return ids;
  }
  // counting weeks only (weeks where at least someone closes)
  var countingWeeks = allW.filter(function(w){ return closersOf(w).length>0; });
  var futureWeeks = allW.filter(function(w){ var d=endDateOf(w.date); return d && d.getTime()>=today; });

  var h='<div>';
  h+='<h2 style="font-weight:600;margin:0 0 4px;color:white;">\u05EA\u05D7\u05D6\u05D9\u05EA \u05D4\u05E6\u05D5\u05D5\u05EA</h2>';
  h+='<p style="color:#71717a;font-size:12px;margin:0 0 16px;">\u05D0\u05D9\u05DA \u05D4\u05E6\u05D5\u05D5\u05EA \u05D9\u05D5\u05E6\u05D0 \u05D1\u05EA\u05E7\u05D5\u05E4\u05D4 \u05D4\u05E0\u05D5\u05DB\u05D7\u05D9\u05EA</p>';

  // ===== 1. TEAM SUMMARY =====
  var totalClosures = 0;
  activeF.forEach(function(f){ totalClosures += (counts[f.id]?counts[f.id].total:0); });
  var avg = activeF.length ? (totalClosures/activeF.length) : 0;
  var totals = activeF.map(function(f){return counts[f.id]?counts[f.id].total:0;});
  var maxT=Math.max.apply(null,totals.concat([0])), minT=Math.min.apply(null,totals.concat([0]));
  var busiest = activeF.slice().sort(function(a,b){return (counts[b.id]?counts[b.id].total:0)-(counts[a.id]?counts[a.id].total:0);})[0];
  var freest = activeF.slice().sort(function(a,b){return (counts[a.id]?counts[a.id].total:0)-(counts[b.id]?counts[b.id].total:0);})[0];

  // ---- team rhythm: on average, how many weekends between one closure and the next, per person ----
  // = (total person-weeks) / (total closures). Equivalent to activeCount / avgClosersPerWeek.
  function closersCount(w){
    if(w.type==="op") return w.opSize==="full" ? (w.people||[]).length : 0;
    var n=0; weekSlots(w).forEach(function(sl){
      if(sl.role==="konan" && !w.konanActivated) return;
      if(sl.role==="kk" && (sl.kkType||"full")!=="full") return;
      if(sl.role==="mkBoker" || sl.role==="mkErev") return;
      n+=sl.people.filter(function(id){var ff=F(id);return ff&&ff.active;}).length;
    });
    return n;
  }
  var totalCloserSlots=0;
  countingWeeks.forEach(function(w){ totalCloserSlots += closersCount(w); });
  // every X weekends a given person closes (on average)
  var everyN = totalCloserSlots>0 ? (activeF.length * countingWeeks.length / totalCloserSlots) / countingWeeks.length : 0;
  // that simplifies to activeF.length / avgClosersPerWeek
  var avgClosersPerWeek = countingWeeks.length>0 ? totalCloserSlots/countingWeeks.length : 0;
  everyN = avgClosersPerWeek>0 ? activeF.length/avgClosersPerWeek : 0;
  // build the rhythm string: "יוצא יוצא סוגר" - (round(everyN)-1) times יוצא + סוגר
  function rhythmString(n){
    var r=Math.max(1, Math.round(n));
    if(r<=1) return "\u05E1\u05D5\u05D2\u05E8 \u05DB\u05DC \u05E9\u05D1\u05D5\u05E2"; // closes every week
    var parts=[];
    for(var i=0;i<r-1;i++) parts.push("\u05D9\u05D5\u05E6\u05D0");
    parts.push("\u05E1\u05D5\u05D2\u05E8");
    return parts.join(" \u00B7 ");
  }

  function statBox(label, value, sub, color){
    return '<div style="background:#18181b;border-radius:12px;border:1px solid #27272a;padding:14px;"><div style="font-size:24px;font-weight:bold;color:'+(color||"white")+';">'+value+'</div><div style="font-size:12px;color:#a1a1aa;margin-top:2px;">'+label+'</div>'+(sub?'<div style="font-size:11px;color:#52525b;margin-top:2px;">'+sub+'</div>':'')+'</div>';
  }
  // team rhythm (average) box
  var secRhythm='<div style="background:linear-gradient(135deg,rgba(37,99,235,0.15),rgba(5,150,105,0.12));border:1px solid rgba(37,99,235,0.3);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;">';
  secRhythm+='<div style="font-size:12px;color:#93c5fd;margin-bottom:6px;">\u05D4\u05DE\u05E7\u05E6\u05D1 \u05D4\u05E6\u05D5\u05D5\u05EA\u05D9 \u05D4\u05DE\u05DE\u05D5\u05E6\u05E2</div>';
  secRhythm+='<div style="font-size:20px;font-weight:bold;color:white;letter-spacing:1px;">'+rhythmString(everyN)+'</div>';
  secRhythm+='<div style="font-size:11px;color:#71717a;margin-top:6px;">\u05D1\u05DE\u05DE\u05D5\u05E6\u05E2 \u05DB\u05DC \u05DC\u05D5\u05D7\u05DD \u05E1\u05D5\u05D2\u05E8 \u05E4\u05E2\u05DD \u05D1\u05DB\u05BE~'+ (everyN>0?everyN.toFixed(1):"-") +' \u05E1\u05D5\u05E4\u05F4\u05E9\u05D9\u05DD</div>';
  secRhythm+='</div>';
  // נטחן / בבית boxes
  var secBoxes='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">';
  secBoxes+=statBox("\u05D4\u05DB\u05D9 \u05E0\u05D8\u05D7\u05DF", busiest?esc(busiest.name):"-", (busiest?(counts[busiest.id]?counts[busiest.id].total:0)+" \u05E1\u05D2\u05D9\u05E8\u05D5\u05EA":""), "#f59e0b");
  secBoxes+=statBox("\u05D4\u05DB\u05D9 \u05D1\u05D1\u05D9\u05EA", freest?esc(freest.name):"-", (freest?(counts[freest.id]?counts[freest.id].total:0)+" \u05E1\u05D2\u05D9\u05E8\u05D5\u05EA":""), "#34d399");
  secBoxes+='</div>';
  // balance bar
  var spread=maxT-minT;
  var balColor = spread<=1 ? "#34d399" : spread<=2 ? "#fbbf24" : "#f87171";
  var balText = spread<=1 ? "\u05D4\u05E6\u05D5\u05D5\u05EA \u05DE\u05D0\u05D5\u05D6\u05DF \u05DE\u05D0\u05D5\u05D3" : spread<=2 ? "\u05D0\u05D9\u05D6\u05D5\u05DF \u05E1\u05D1\u05D9\u05E8" : "\u05D9\u05E9 \u05E4\u05E2\u05E8 \u2014 \u05DB\u05D3\u05D0\u05D9 \u05DC\u05D0\u05D6\u05DF";
  var secBalance='<div style="background:'+balColor+'1a;border:1px solid '+balColor+'55;border-radius:10px;padding:12px;margin-bottom:16px;text-align:center;"><span style="color:'+balColor+';font-weight:600;font-size:14px;">'+balText+'</span><span style="color:#71717a;font-size:12px;"> \u00B7 \u05E4\u05E2\u05E8 \u05DE\u05E7\u05E1\u05D9\u05DE\u05DC\u05D9 '+spread+' \u05E1\u05D2\u05D9\u05E8\u05D5\u05EA</span></div>';

  // ===== 2. PERSONAL RHYTHM =====
  var secPersonal='';
  secPersonal+='<div style="background:#18181b;border-radius:12px;border:1px solid #27272a;padding:14px;margin-bottom:16px;">';
  secPersonal+='<p style="font-weight:600;font-size:14px;color:white;margin:0 0 12px;">\u05E7\u05E6\u05D1 \u05D0\u05D9\u05E9\u05D9</p>';
  // compute rhythm: span of counting weeks / closures per fighter; and next closure date
  var firstW = countingWeeks[0] ? endDateOf(countingWeeks[0].date) : null;
  var lastW = countingWeeks[countingWeeks.length-1] ? endDateOf(countingWeeks[countingWeeks.length-1].date) : null;
  var rhythmF = activeF.slice().sort(function(a,b){return (counts[a.id]?counts[a.id].total:0)-(counts[b.id]?counts[b.id].total:0);});
  rhythmF.forEach(function(f){
    var tot = counts[f.id]?counts[f.id].total:0;
    // find next future week where this fighter closes
    var nextClose=null;
    for(var i=0;i<allW.length;i++){
      var w=allW[i]; var d=endDateOf(w.date);
      if(d && d.getTime()>=today && closersOf(w).indexOf(f.id)!==-1){ nextClose=w.date; break; }
    }
    // rhythm: every ~N weeks (countingWeeks / tot)
    var rhythmTxt;
    if(tot===0){ rhythmTxt="\u05E2\u05D3\u05D9\u05D9\u05DF \u05DC\u05D0 \u05E1\u05D2\u05E8"; }
    else { var every=(countingWeeks.length/tot); rhythmTxt="\u05E1\u05D5\u05D2\u05E8 \u05DB\u05DC ~"+every.toFixed(1)+" \u05E9\u05D1\u05D5\u05E2\u05D5\u05EA"; }
    secPersonal+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #27272a;">';
    secPersonal+='<span style="font-size:14px;color:white;min-width:80px;">'+esc(f.name)+'</span>';
    secPersonal+='<span style="font-size:12px;color:#71717a;flex:1;">'+rhythmTxt+'</span>';
    if(nextClose) secPersonal+='<span style="font-size:11px;color:#fbbf24;background:rgba(120,53,15,0.3);padding:2px 8px;border-radius:999px;white-space:nowrap;">\u05D4\u05D1\u05D0: '+esc(nextClose)+'</span>';
    else secPersonal+='<span style="font-size:11px;color:#52525b;">\u05D0\u05D9\u05DF \u05DE\u05EA\u05D5\u05DB\u05E0\u05DF</span>';
    secPersonal+='<span style="font-size:13px;color:#a1a1aa;font-family:monospace;min-width:20px;text-align:left;">'+tot+'</span>';
    secPersonal+='</div>';
  });
  secPersonal+='</div>';

  // ===== 3. WEEK GRID =====
  var secGrid='';
  secGrid+='<div style="background:#18181b;border-radius:12px;border:1px solid #27272a;padding:14px;overflow-x:auto;">';
  secGrid+='<p style="font-weight:600;font-size:14px;color:white;margin:0 0 4px;">\u05DC\u05D5\u05D7 \u05E9\u05D1\u05D5\u05E2\u05D5\u05EA</p>';
  secGrid+='<p style="font-size:11px;color:#52525b;margin:0 0 12px;">\u05E1=\u05E1\u05D5\u05D2\u05E8 \u00B7 \u05DB=\u05DB\u05D5\u05E0\u05DF \u00B7 \u05E0\u05E7\u05D5\u05D3\u05D4=\u05D9\u05D5\u05E6\u05D0</p>';
  if(allW.length===0){
    secGrid+='<p style="color:#52525b;font-size:13px;">\u05D0\u05D9\u05DF \u05E1\u05D2\u05D9\u05E8\u05D5\u05EA</p>';
  } else {
    secGrid+='<table style="border-collapse:collapse;font-size:11px;color:white;width:100%;">';
    secGrid+='<tr><th style="text-align:right;padding:4px 8px;position:sticky;right:0;background:#18181b;"></th>';
    allW.forEach(function(w){
      var d=endDateOf(w.date); var isPast = d && d.getTime()<today;
      secGrid+='<th style="padding:4px 5px;color:'+(isPast?"#52525b":"#a1a1aa")+';font-weight:500;writing-mode:vertical-rl;white-space:nowrap;font-size:10px;">'+esc(w.date)+'</th>';
    });
    secGrid+='</tr>';
    var sortedF = activeF.slice().sort(function(a,b){return (counts[b.id]?counts[b.id].total:0)-(counts[a.id]?counts[a.id].total:0);});
    sortedF.forEach(function(f){
      secGrid+='<tr><td style="padding:4px 8px;white-space:nowrap;position:sticky;right:0;background:#18181b;border-left:1px solid #27272a;">'+esc(f.name)+'</td>';
      allW.forEach(function(w){
        var closing=closersOf(w).indexOf(f.id)!==-1;
        var isKonan=false;
        if(w.type!=="op") weekSlots(w).forEach(function(sl){ if(sl.role==="konan" && !w.konanActivated && sl.people.indexOf(f.id)!==-1) isKonan=true; });
        var cell,bg,col;
        if(closing){ cell="\u05E1"; bg="rgba(5,150,105,0.3)"; col="#34d399"; }
        else if(isKonan){ cell="\u05DB"; bg="rgba(120,53,15,0.25)"; col="#fb923c"; }
        else { cell="\u00B7"; bg="transparent"; col="#3f3f46"; }
        secGrid+='<td style="text-align:center;padding:4px 5px;background:'+bg+';color:'+col+';font-weight:'+(closing?"bold":"normal")+';">'+cell+'</td>';
      });
      secGrid+='</tr>';
    });
    secGrid+='</table>';
  }
  secGrid+='</div>';

  // assemble: team rhythm, then נטחן/בבית, then balance, personal rhythm, week grid
  h+=secRhythm;
  h+=secBoxes;
  h+=secBalance;
  h+=secPersonal;
  h+=secGrid;
  h+='</div>';
  return h;
}
function renderStats(counts){
  var h='<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h2 style="font-weight:600;margin:0;color:white;">סטטיסטיקות</h2>';
  h+='<span style="font-size:11px;color:#52525b;">לחץ על לוחם לפירוט</span></div>';
  var sorted=fighters.slice().sort(function(a,b){
    // active fighters first, inactive at the bottom
    if(a.active!==b.active) return a.active ? -1 : 1;
    return (counts[b.id]?counts[b.id].total:0)-(counts[a.id]?counts[a.id].total:0);
  });
  var maxVal=Math.max.apply(null,fighters.map(function(x){return counts[x.id]?counts[x.id].total:0;}).concat([1]));
  sorted.forEach(function(f){
    var c=counts[f.id]||{total:0,atlit:0,t23:0,mkKK:0,mkutz:0};
    var pct=(c.total/maxVal)*100;
    var open=!!statsExpanded[f.id];
    var totalShort = (c.mkutz||0) + (c.opMorning||0) + (c.opEvening||0);
    h+='<div style="background:#18181b;border-radius:12px;border:1px solid '+(f.active?"#27272a":"#1c1c1f")+';padding:12px;margin-bottom:8px;opacity:'+(f.active?1:0.4)+';cursor:pointer;" onclick="__a.toggleStat(\''+f.id+'\')">';
    // compact row: chevron + name + (short badge) + total
    h+='<div style="display:flex;align-items:center;gap:8px;">';
    h+='<span style="font-size:11px;color:#52525b;transition:transform 0.2s;">'+(open?"\u25BC":"\u25C0")+'</span>';
    h+='<span style="font-size:14px;font-weight:600;color:white;">'+esc(f.name)+'</span>';
    if(!f.active) h+='<span style="font-size:11px;color:#52525b;background:#27272a;padding:2px 6px;border-radius:4px;">\u05dc\u05d0 \u05e4\u05e2\u05d9\u05dc</span>';
    if(totalShort>0 && !open) h+='<span style="font-size:10px;color:#d8b4fe;background:rgba(88,28,135,0.3);padding:2px 6px;border-radius:4px;">'+totalShort+' \u05de\u05e7\u05d5\u05e6\u05e8\u05d5\u05ea</span>';
    h+='<span style="margin-right:auto;font-size:13px;color:#a1a1aa;font-family:monospace;font-weight:600;">'+c.total+'</span></div>';
    // bar
    h+='<div style="height:6px;background:#27272a;border-radius:999px;overflow:hidden;margin-top:8px;"><div style="height:100%;width:'+pct+'%;background:#f59e0b;border-radius:999px;"></div></div>';
    // detail (only when open)
    if(open){
      h+='<div style="display:flex;gap:12px;font-size:12px;color:#71717a;flex-wrap:wrap;margin-top:10px;">';
      h+='<span><span style="color:#34d399;">'+c.atlit+'</span> \u05e6 \u05e6\u05e4\u05d5\u05df</span>';
      h+='<span><span style="color:#60a5fa;">'+c.t23+'</span> \u05e6\u05f423</span>';
      if(c.sadat>0) h+='<span><span style="color:#22d3ee;">'+c.sadat+'</span> \u05e9\u05d3\u05ea</span>';
      if(c.kk>0) h+='<span><span style="color:#f59e0b;">'+c.kk+'</span> \u05db\u05f4\u05db</span>';
      if(c.konan>0) h+='<span><span style="color:#fb923c;">'+c.konan+'</span> \u05db\u05d5\u05e0\u05df \u05d1\u05d9\u05ea</span>';
      if(c.op>0) h+='<span><span style="color:#fbbf24;">'+c.op+'</span> \u05e4\u05f4 \u05de\u05d1\u05e6\u05e2\u05d9\u05ea</span>';
      h+='</div>';
      h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid #27272a;display:flex;gap:12px;font-size:12px;flex-wrap:wrap;">';
      h+='<span style="color:'+(totalShort>0?"#d8b4fe":"#52525b")+';font-weight:'+(totalShort>0?"600":"400")+';">\u05de\u05e7\u05d5\u05e6\u05e8\u05d5\u05ea/\u05d7\u05d6\u05e8\u05d5\u05ea \u05de\u05d5\u05e7\u05d3\u05de\u05d5\u05ea: <span style="font-family:monospace;">'+totalShort+'</span></span>';
      if(c.mkutz>0) h+='<span style="color:#a855f7;">'+c.mkutz+' \u05de\u05e7\u05d5\u05e6\u05e8\u05ea \u05db\u05f4\u05db</span>';
      if(c.opMorning>0) h+='<span style="color:#fb923c;">'+c.opMorning+' \u05d1\u05d5\u05e7\u05e8</span>';
      if(c.opEvening>0) h+='<span style="color:#fb923c;">'+c.opEvening+' \u05e2\u05e8\u05d1</span>';
      h+='</div>';
    }
    h+='</div>';
  });
  h+='</div>';
  return h;
}
// ---- startup ----
loadLocal();      // show saved data instantly
loaded = true;
render();
connectFirebase(); // then sync with cloud in background
</script>
